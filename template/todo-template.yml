AWSTemplateFormatVersion: 2010-09-09
Description: This is a template file for Todo APK dummy.

Resources:

  #S3
  TodoS3ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: todo-s3-apk-bucket
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldPipelineArtifacts
            Status: Enabled
            Prefix: todo-codepipeline-pi/
            ExpirationInDays: 3     
          - Id: DeleteOldCache
            Status: Enabled
            Prefix: cache/
            ExpirationInDays: 7  

  TodoAPKBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: todo-apk-uploads-dev
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  #Role and Policy

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: todo-codebuild-role
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - codebuild.amazonaws.com
            Action: 
              - sts:AssumeRole
      Policies:
        - PolicyName: todo-codebuild-policy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:*
                  - logs:*
                  - ecr:*
                  - lambda:*
                  - apigateway:*
                  - iam:*
                  - cloudformation:*
                  - sns:*
                  - ssm:*
                Resource: '*'

  CodePipleineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: todo-codepipeline-role
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - codepipeline.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: todo-codepipeline-policy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - codestar-connections:*
                  - codebuild:*
                  - ec2:*
                  - s3:*
                  - logs:*
                  - ecr:*
                  - lambda:*
                  - apigateway:*
                  - iam:*
                  - cloudformation:*
                  - sns:*
                  - ssm:*
                Resource: '*'

  #CodeStarConnection

  TodoCodeStarConnction:
    Type: AWS::CodeStarConnections::Connection
    Properties:
      ConnectionName: todo-git-connection
      ProviderType: GitHub

  #CodeBuild

  TodoCodeBuildProject: 
    Type: AWS::CodeBuild::Project
    Properties:
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec-build.yml
      Artifacts:
        Type: CODEPIPELINE
      Cache:                        
        Type: S3
        Location: !Sub ${TodoS3ArtifactBucket}/cache

  #Pipeline

  TodoCodePipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: todo-codepipeline-pipeline
      RoleArn: !GetAtt CodePipleineRole.Arn
      PipelineType: V2
      ArtifactStore:
        Type: S3
        Location: !Ref TodoS3ArtifactBucket
      Triggers:
        - ProviderType: CodeStarSourceConnection
          GitConfiguration:
            SourceActionName: Source
            Push:
              - Branches:
                  Includes:
                    - main1
        
      Stages:
        - Name: Source
          Actions:
            - Name: Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref TodoCodeStarConnction
                FullRepositoryId: Hasil-21/Dummy-Todo-App
                BranchName: main
                DetectChanges: false
              OutputArtifacts:
                - Name: SourceOutput

        - Name: Build
          Actions:
            - Name: Build
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref TodoCodeBuildProject
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts: 
                - Name: BuildOutput

        - Name: Deploy
          Actions:
            - Name: DeployAPK
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: S3
                Version: '1'
              Configuration:
                BucketName: !Ref TodoAPKBucket
                Extract: false
                ObjectKey: builds/app-release.apk
              InputArtifacts:
                - Name: BuildOutput

  #SSM

  S3BucketNameSSM:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /todo-app/dev/s3-bucket-name
      Type: String
      Value: !Ref TodoAPKBucket


