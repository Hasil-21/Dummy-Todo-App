service: todo-dummy
frameworkVersion: '3'

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: true
    platform: node
    target: node20
    exclude:
      - '@aws-sdk/*'

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  stage: dev

  environment:
    SNS_TOPIC_ARN: ${ssm:/todo-app/dev/sns-topic-name}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - sns:*
            - s3:*
            - ssm:*
          Resource: '*'

functions:
  todo-sns:
    handler: src/handler.notify
    events:
      - s3: 
          bucket: ${ssm:/todo-app/dev/s3-bucket-name}
          event: s3:ObjectCreated:*
          existing: true
          rules:
            - suffix: .apk

